name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  LOGO: Sources/DS-mon/dslogo1.png
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release --disable-sandbox

      - name: Prepare .app bundle
        run: |
          BUNDLE="build/DS-mon.app"
          mkdir -p "$BUNDLE/Contents/MacOS" "$BUNDLE/Contents/Resources"
          cp .build/release/DS-mon "$BUNDLE/Contents/MacOS/"
          cp -R .build/release/DS-mon_DS-mon.bundle "$BUNDLE/Contents/Resources/"

      - name: Generate AppIcon.icns
        run: |
          ICONSET=/tmp/AppIcon.iconset
          rm -rf "$ICONSET" && mkdir "$ICONSET"
          for s in 16 32 128 256 512; do
            sips -z "$s" "$s" "$LOGO" --out "$ICONSET/icon_${s}x${s}.png"
            sips -z "$((s*2))" "$((s*2))" "$LOGO" --out "$ICONSET/icon_${s}x${s}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o build/DS-mon.app/Contents/Resources/AppIcon.icns

      - name: Generate Info.plist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > build/DS-mon.app/Contents/Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleExecutable</key>
              <string>DS-mon</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>com.cherno.DS-mon</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>DS-mon</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>$VERSION</string>
              <key>CFBundleVersion</key>
              <string>${{ github.run_number }}</string>
              <key>LSUIElement</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>15.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>MacOSX</string>
              </array>
          </dict>
          </plist>
          PLIST

      - name: Code sign
        run: codesign --force --deep --sign - build/DS-mon.app

      - name: Package as .zip
        run: |
          rm -f build/DS-mon-*.zip
          cd build
          ditto -c -k --keepParent DS-mon.app "DS-mon-${GITHUB_REF_NAME}.zip"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/DS-mon-*.zip
