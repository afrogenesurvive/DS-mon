name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Build codex-relay
        run: |
          brew install rust
          cd codex-relay-src
          cargo build --release
          cp target/release/codex-relay "$OLDPWD/codex-relay"
          chmod +x "$OLDPWD/codex-relay"

      - name: Package .app (build.sh)
        run: bash scripts/build.sh "${GITHUB_REF_NAME#v}"

      - name: Code sign
        run: codesign --force --sign - build/DS-mon.app

      - name: Package as .zip
        run: |
          rm -f build/DS-mon-*.zip
          cd build
          ditto -c -k --keepParent DS-mon.app "DS-mon-${GITHUB_REF_NAME}.zip"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/DS-mon-*.zip

      - name: Update Homebrew tap
        env:
          GH_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${GH_PAT}@github.com/Cherno76/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i '' "s/version \"[0-9.]*\"/version \"${VERSION}\"/" Casks/ds-mon.rb
          git add .
          git -c user.name='DS-mon CI' -c user.email='ds-mon-ci@github.com' \
            commit -m "chore: bump ds-mon to v${VERSION}"
          git push
